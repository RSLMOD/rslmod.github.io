<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RSL Speed Mod — Ускорение реальности</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --bg: radial-gradient(circle at 10% 20%, #0a0a1a, #02020f);
            --text-main: #ffffff;
            --accent: #3b82f6;
            --card-bg: rgba(20, 20, 35, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --badge-text-color: #ffffff;
        }

        body.light {
            --bg: #ffffff;
            --text-main: #000000; 
            --accent: #2563eb;
            --card-bg: #f1f5f9;
            --border: #e2e8f0;
            --badge-text-color: #1e3a8a;
        }

        body.light h1, body.light .hero-desc, body.light .stat-item, body.light .feature-item h3, body.light .feature-item p {
            color: #000000 !important;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            transition: background 0.3s ease;
            min-height: 100vh;
            background: var(--bg) !important;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }

        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 0; }
        .logo { font-size: 1.6rem; font-weight: 900; user-select: none; }

        .theme-toggle {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 0.5rem 1rem; border-radius: 2rem; color: var(--text-main);
            font-weight: 700; display: flex; align-items: center; gap: 8px; cursor: pointer;
        }

        .hero { text-align: center; padding: 1rem 0; }
        .version-badge {
            display: block; margin: 0.8rem auto 1.5rem; width: fit-content; background: #000; color: #fff;
            padding: 4px 14px; border-radius: 20px; font-size: 0.65rem; font-weight: 900;
        }

        .badge {
            display: inline-block; padding: 0.6rem 1.4rem; border-radius: 40px; font-size: 0.75rem; font-weight: 900;
            margin-bottom: 2rem; position: relative; background: var(--bg);
            color: var(--badge-text-color) !important; border: 2px solid transparent; background-clip: padding-box;
            animation: badgeFloat 3s infinite ease-in-out;
        }
        .badge::after {
            content: ''; position: absolute; top: -2px; bottom: -2px; left: -2px; right: -2px;
            background: linear-gradient(130deg, #3b82f6, #ec4899, #4f46e5);
            z-index: -1; border-radius: 40px;
        }
        @keyframes badgeFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* СТАТИСТИКА */
        .stats-container { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .stat-item {
            font-weight: 800; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;
            background: var(--card-bg); padding: 0.6rem 1.2rem; border-radius: 15px;
            border: 1px solid var(--border); transition: 0.3s; cursor: pointer;
        }
        .stat-item:active { transform: scale(0.9); }
        .stat-item.like i { color: #22c55e; }
        .stat-item.dislike i { color: #ef4444; }

        h1 { font-size: clamp(2.5rem, 9vw, 5rem); font-weight: 900; margin-bottom: 1.5rem; }
        h1 span.mod-text { color: #2563eb; }

        .hero-desc { font-size: clamp(1rem, 4vw, 1.15rem); max-width: 600px; margin: 0 auto 3rem; font-weight: 700; opacity: 0.9; }

        /* КНОПКИ */
        .download-grid { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; }
        .download-btn {
            width: 280px; padding: 1.1rem; border-radius: 60px; font-weight: 900; text-decoration: none;
            display: inline-flex; justify-content: center; align-items: center; gap: 10px; transition: 0.3s; cursor: pointer;
        }
        .download-btn.primary { background: #2563eb; color: white; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3); }
        .download-btn.secondary { background: #1e293b; color: white; }
        .download-btn.outline { border: 2px solid #2563eb; color: #2563eb; }

        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin: 4rem 0; }
        .feature-item {
            padding: 2.5rem; text-align: center; border-radius: 2rem; background: var(--card-bg); border: 1px solid var(--border);
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .feature-item i { font-size: 2.5rem; color: #2563eb; margin-bottom: 1.2rem; }

        footer { text-align: center; padding: 2rem; font-weight: 800; opacity: 0.7; }
    </style>
</head>
<body class="dark">

    <div class="container">
        <nav class="navbar">
            <div class="logo">RSL SPEED</div>
            <div class="theme-toggle" id="themeToggle">
                <i class="fas fa-adjust"></i> <span id="themeText">Тёмная</span>
            </div>
        </nav>

        <main class="hero">
            <div class="version-badge">VERSION 3.0.2</div>
            <div class="badge"><i class="fas fa-bolt"></i> <span>НОВЫЙ РЕЛИЗ</span></div>

            <div class="stats-container" data-aos="fade-up">
                <div class="stat-item" id="btnDl">
                    <i class="fas fa-download" style="color:#3b82f6"></i> <span id="countDl">0</span>
                </div>
                <div class="stat-item like" id="btnLike">
                    <i class="fas fa-thumbs-up"></i> <span id="countLike">0</span>
                </div>
                <div class="stat-item dislike" id="btnDislike">
                    <i class="fas fa-thumbs-down"></i> <span id="countDislike">0</span>
                </div>
            </div>
            
            <h1>RSL Speed <span class="mod-text">Mod</span></h1>
            <p class="hero-desc">Технология ускорения игрового процесса. Стабильный FPS и минимальный инпут-лаг на любом устройстве.</p>

            <div class="download-grid">
                <a href="#" class="download-btn primary dl-trigger"><i class="fas fa-rocket"></i> Скачать Mod</a>
                <a href="#" class="download-btn secondary dl-trigger"><i class="fas fa-copy"></i> Скачать Клон</a>
                <a href="#" class="download-btn outline dl-trigger">Оригинал</a>
            </div>
        </main>

        <section class="features">
            <div class="feature-item" data-aos="fade-up"><i class="fas fa-bolt"></i><h3>Скорость</h3><p>Разблокировка лимитов системы.</p></div>
        </section>

        <footer><p>© 2026 RSL Speed Mod</p></footer>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // --- ЛОГИКА ХРАНЕНИЯ (LocalStorage для теста + заглушка для API) ---
        // Чтобы данные не обнулялись, пока ты не настроил Firebase, используем память браузера
        const getVal = (key) => parseInt(localStorage.getItem(key)) || 0;
        const setVal = (key, val) => {
            localStorage.setItem(key, val);
            document.getElementById('count' + key.charAt(0).toUpperCase() + key.slice(1)).textContent = val;
        };

        // Инициализация
        const stats = { dl: getVal('dl'), like: getVal('like'), dislike: getVal('dislike') };
        Object.keys(stats).forEach(key => {
            const el = document.getElementById('count' + key.charAt(0).toUpperCase() + key.slice(1));
            if(el) el.textContent = stats[key];
        });

        // Обработка кликов
        document.getElementById('btnLike').onclick = () => setVal('like', getVal('like') + 1);
        document.getElementById('btnDislike').onclick = () => setVal('dislike', getVal('dislike') + 1);
        
        document.querySelectorAll('.dl-trigger').forEach(btn => {
            btn.onclick = (e) => {
                e.preventDefault();
                setVal('dl', getVal('dl') + 1);
                alert("Действие выполнено!");
            };
        });

        // Переключение темы
        const themeBtn = document.getElementById('themeToggle');
        function setTheme(t) {
            document.body.className = t;
            document.getElementById('themeText').textContent = t === 'light' ? 'Светлая' : 'Тёмная';
            localStorage.setItem('theme', t);
        }
        themeBtn.onclick = () => setTheme(document.body.classList.contains('light') ? 'dark' : 'light');
        setTheme(localStorage.getItem('theme') || 'dark');
    </script>
</body>
</html>
