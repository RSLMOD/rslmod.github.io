<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RSL Speed Mod</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* Стили оставляю оригинальные, как на твоих скринах */
        :root { --bg: #0a0a1a; --text: #ffffff; --accent: #3b82f6; --prem: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); text-align: center; margin: 0; padding: 20px; }
        .premium-card { background: rgba(20, 20, 35, 0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 2rem; max-width: 450px; margin: 50px auto; }
        .prem-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; color: white; margin: 20px 0; text-align: center; font-size: 1rem; }
        .prem-btn { background: var(--prem); color: white; border: none; padding: 14px; border-radius: 50px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }
        #premStatus { margin-top: 15px; font-weight: 700; font-size: 0.9rem; }
        #premiumDownloads { display: none; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .dl-btn { display: block; background: rgba(245, 158, 11, 0.1); border: 2px solid var(--prem); color: white; padding: 10px; margin: 5px 0; border-radius: 10px; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

    <div class="premium-card">
        <i class="fas fa-crown" style="font-size: 3rem; color: #f59e0b;"></i>
        <h2>Проверка ID</h2>
        <p style="opacity: 0.7;">Введите ваш игровой ID для доступа</p>
        
        <input type="text" id="premInput" class="prem-input" placeholder="35f7d9c506f82778">
        <button id="premBtn" class="prem-btn">ПРОВЕРИТЬ ДОСТУП</button>
        
        <div id="premStatus"></div>
        
        <div id="premiumDownloads">
            <a href="#" class="dl-btn">СКАЧАТЬ PREMIUM MOD</a>
            <a href="#" class="dl-btn">СКАЧАТЬ CLONE PREMIUM</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Твой конфиг Firebase из скриншотов
        const firebaseConfig = {
            apiKey: "AIzaSyAP6KsJ3mMPY1DU4ehoo_HSs_T_PhqkzHg",
            authDomain: "rslmod-4634c.firebaseapp.com",
            databaseURL: "https://rslmod-4634c-default-rtdb.firebaseio.com",
            projectId: "rslmod-4634c",
            storageBucket: "rslmod-4634c.firebasestorage.app",
            appId: "1:906099766404:web:cd24362b3638fec963d6d1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const pBtn = document.getElementById('premBtn');
        const pInput = document.getElementById('premInput');
        const pStatus = document.getElementById('premStatus');
        const pDownloads = document.getElementById('premiumDownloads');

        async function checkAccess() {
            const id = pInput.value.trim();
            if (!id) {
                pStatus.innerHTML = "<span style='color:#f59e0b'>Введите ID</span>";
                return;
            }

            pBtn.textContent = "СИНХРОНИЗАЦИЯ...";
            pStatus.innerHTML = "";

            try {
                // Прямое обращение к узлу premium_ids_v2 из твоей базы
                const snapshot = await get(ref(db, `premium_ids_v2/${id}`));

                if (snapshot.exists() && snapshot.val() === true) {
                    pStatus.innerHTML = "<span style='color:#22c55e'>ДОСТУП РАЗРЕШЕН</span>";
                    pBtn.textContent = "УСПЕШНО";
                    pDownloads.style.display = 'block';
                    localStorage.setItem('rsl_id', id);
                } else {
                    pStatus.innerHTML = "<span style='color:#ef4444'>ID не найден в базе</span>";
                    pBtn.textContent = "ПРОВЕРИТЬ ДОСТУП";
                }
            } catch (error) {
                console.error(error);
                pStatus.innerHTML = "<span style='color:#ef4444'>Ошибка подключения к базе</span>";
                pBtn.textContent = "ПРОВЕРИТЬ ДОСТУП";
            }
        }

        pBtn.onclick = checkAccess;

        // Авто-проверка если ID уже сохранен
        if(localStorage.getItem('rsl_id')) {
            pInput.value = localStorage.getItem('rsl_id');
            checkAccess();
        }
    </script>
</body>
</html>
