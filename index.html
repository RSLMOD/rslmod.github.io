<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>RSLmod — Мод для игры</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ПЕРЕМЕННЫЕ ТЕМ */
        :root {
            --bg-color: #0a0c12;
            --text-main: #ffffff;
            --text-secondary: #b9c3e6;
            --card-bg: #11131f;
            --card-border: #252c42;
            --accent: #3b6eff;
            --header-border: rgba(255,255,255,0.08);
            --btn-secondary: #1f2a46;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --text-main: #0f172a;
            --text-secondary: #475569;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --header-border: #e2e8f0;
            --accent: #2563eb;
            --btn-secondary: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.3s ease, border 0.3s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); line-height: 1.5; scroll-behavior: smooth; overflow-x: hidden; }
        
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(59, 110, 255, 0.1), transparent); z-index: -2; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        
        /* ШАПКА */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 24px 0; border-bottom: 1px solid var(--header-border); }
        .logo { font-size: 1.8rem; font-weight: 700; color: var(--text-main); }
        .logo span { color: var(--accent); }
        
        .nav-controls { display: flex; align-items: center; gap: 20px; }
        .theme-toggle { background: var(--btn-secondary); border: 1px solid var(--card-border); color: var(--text-main); width: 44px; height: 44px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }

        /* ГЕРОЙ */
        .hero { padding: 80px 0 60px; display: flex; flex-wrap: wrap; gap: 40px; justify-content: space-between; align-items: center; }
        .hero-text { flex: 1; min-width: 300px; }
        
        /* ЯРКИЙ ЗАГОЛОВОК */
        .hero-text h1 { 
            font-size: 3.5rem; 
            font-weight: 800; 
            line-height: 1.1; 
            margin-bottom: 20px; 
            color: var(--text-main);
            text-shadow: 0 0 30px rgba(59, 110, 255, 0.3);
        }
        .hero-text p { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 32px; }
        .hero-image { flex: 1; min-width: 300px; text-align: center; }

        /* КОЛОНКИ (ВОЗВРАЩЕНО) */
        .features { padding: 70px 0; }
        .section-title { font-size: 2rem; font-weight: 700; margin-bottom: 48px; text-align: center; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .card { background: var(--card-bg); padding: 32px; border-radius: 28px; border: 1px solid var(--card-border); transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-icon { font-size: 2.5rem; margin-bottom: 20px; display: block; }
        .card h3 { margin-bottom: 12px; font-size: 1.5rem; }

        /* СЕКЦИЯ ЗАГРУЗКИ */
        .download-section { background: var(--card-bg); border-radius: 48px; padding: 60px 30px; text-align: center; margin: 40px 0; border: 1px solid var(--card-border); }
        .version-chip { background: var(--accent); color: #fff; padding: 8px 20px; border-radius: 40px; display: inline-block; font-size: 0.9rem; margin-bottom: 20px; font-weight: 600; }
        
        .download-buttons { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-top: 32px; }
        .download-btn { 
            padding: 16px 30px; 
            border-radius: 16px; 
            font-weight: 700; 
            color: white; 
            text-decoration: none; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            transition: 0.2s; 
            min-width: 240px;
            justify-content: center;
        }

        .btn-mod { background: var(--accent); box-shadow: 0 8px 20px rgba(59, 110, 255, 0.3); }
        .btn-clone { background: var(--btn-secondary); border: 1px solid var(--card-border); }
        .btn-orig { background: transparent; border: 1px solid var(--card-border); color: var(--text-main); }
        .download-btn:hover { transform: translateY(-3px); opacity: 0.9; }

        footer { text-align: center; padding: 40px 0; color: var(--text-secondary); border-top: 1px solid var(--header-border); }

        /* МОБИЛЬНАЯ АДАПТАЦИЯ */
